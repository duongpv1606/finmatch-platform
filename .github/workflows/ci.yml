name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finmatch-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: finmatch-api/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint --if-present

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finmatch-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: finmatch-web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
