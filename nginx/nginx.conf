events {}

http {
  server {
    listen 80;

    location /api/ {
      proxy_pass http://api:3001/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # AI chat is a chunked text stream — don't buffer it.
      proxy_buffering off;
    }

    location / {
      proxy_pass http://web:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
